<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Philo</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f0f0f0;
            margin: 0;
        }
        #btn-clic {
            padding: 20px 40px;
            font-size: 24px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            transition: transform 0.1s;
        }
        #btn-clic:active {
            transform: scale(0.95);
        }
        .counter {
            font-size: 48px;
            margin-bottom: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="counter" id="compteur">100</div>
    <button id="btn-clic">CLIQUE ICI !</button>

    <script>
        let clicsRestants = 100;
        const bouton = document.getElementById('btn-clic');
        const affichage = document.getElementById('compteur');

        bouton.addEventListener('click', () => {
            clicsRestants--;
            affichage.innerText = clicsRestants;

            if (clicsRestants <= 0) {
                window.location.href = "https://redfloat.github.io/Perso/index.html";
            }
        });
    </script>

</body>
</html>
